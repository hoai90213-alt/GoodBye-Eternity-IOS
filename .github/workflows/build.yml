name: Build iOS app

on:
  workflow_dispatch:
    inputs:
      archive_gdrive_id:
        description: "Google Drive file ID of your .zip archive (optional)"
        required: false
        default: "1BXCD6VYO5PbkMTsKV1z4qQgYt3GARlL8"
      archive_url:
        description: "Direct URL of your .zip archive (optional)"
        required: false
        default: ""
      ipa_name:
        description: "Output IPA filename (without .ipa)"
        required: false
        default: "TF27-iOS"
      template_repo:
        description: "iOS template git repo URL"
        required: false
        default: "https://github.com/laguna783/ios-rpgmaker-native.git"
      template_subdir:
        description: "Project folder inside template repo"
        required: false
        default: "RPG Maker MZ Framework for Xcode 12"

jobs:
  build_ios:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download game archive
        shell: bash
        run: |
          set -euo pipefail

          python3 -m pip install --upgrade pip gdown
          mkdir -p _work

          if [[ -n "${{ inputs.archive_gdrive_id }}" ]]; then
            gdown "https://drive.google.com/uc?id=${{ inputs.archive_gdrive_id }}" -O _work/archive.zip
          elif [[ -n "${{ inputs.archive_url }}" ]]; then
            curl -fL "${{ inputs.archive_url }}" -o _work/archive.zip
          else
            echo "ERROR: Provide archive_gdrive_id or archive_url"
            exit 1
          fi

          unzip -q -o _work/archive.zip -d _work/src

      - name: Resolve WWW folder
        id: resolve_www
        shell: bash
        run: |
          set -euo pipefail

          ROOT="_work/src"
          WWW=""

          # Case 1: archive built by prepare-ios-ipa.ps1
          if [[ -d "$ROOT/ios_port_bundle/www" ]]; then
            WWW="$ROOT/ios_port_bundle/www"
          fi

          # Case 2: contains a ready www folder
          if [[ -z "$WWW" ]]; then
            CANDIDATE="$(find "$ROOT" -type d -name "www" -print | head -n1 || true)"
            if [[ -n "$CANDIDATE" && -f "$CANDIDATE/index.html" ]]; then
              WWW="$CANDIDATE"
            fi
          fi

          # Case 3: raw game root (index.html + data + tyrano)
          if [[ -z "$WWW" ]]; then
            CANDIDATE="$(find "$ROOT" -type f -name "index.html" -print | while read -r idx; do
              base="$(dirname "$idx")"
              if [[ -d "$base/data" && -d "$base/tyrano" ]]; then
                echo "$base"
                break
              fi
            done)"
            if [[ -n "$CANDIDATE" ]]; then
              WWW="$CANDIDATE"
            fi
          fi

          if [[ -z "$WWW" ]]; then
            echo "ERROR: Could not find a valid web game folder"
            exit 1
          fi

          echo "Resolved WWW: $WWW"
          du -sh "$WWW" || true
          echo "www_path=$WWW" >> "$GITHUB_OUTPUT"

      - name: Prepare iOS template project
        id: prepare_ios
        shell: bash
        run: |
          set -euo pipefail

          git clone --depth 1 "${{ inputs.template_repo }}" _work/template

          PROJ_DIR="_work/template/${{ inputs.template_subdir }}"
          if [[ ! -d "$PROJ_DIR" ]]; then
            echo "ERROR: template_subdir not found: $PROJ_DIR"
            echo "Template tree:"
            find _work/template -maxdepth 2 -type d -print
            exit 1
          fi

          rm -rf "$PROJ_DIR/www"
          mkdir -p "$PROJ_DIR/www"
          rsync -a --delete "${{ steps.resolve_www.outputs.www_path }}/" "$PROJ_DIR/www/"

          # Patch common WKWebView read access issue.
          VIEW="$PROJ_DIR/ViewController.swift"
          if [[ -f "$VIEW" ]]; then
            sed -i '' 's/allowingReadAccessTo: htmlPath)/allowingReadAccessTo: htmlPath.deletingLastPathComponent())/g' "$VIEW"
          fi

          PROJECT="$(find "$PROJ_DIR" -maxdepth 1 -name "*.xcodeproj" -print -quit || true)"
          if [[ -z "$PROJECT" ]]; then
            PROJECT="$(find _work/template -name "*.xcodeproj" -print -quit || true)"
          fi
          if [[ -z "$PROJECT" ]]; then
            echo "ERROR: No .xcodeproj found"
            exit 1
          fi

          SCHEME="$(xcodebuild -list -project "$PROJECT" | awk '/Schemes:/{flag=1;next} flag && NF {print; exit}' | xargs)"
          if [[ -z "$SCHEME" ]]; then
            echo "ERROR: No build scheme found"
            exit 1
          fi

          echo "project=$PROJECT" >> "$GITHUB_OUTPUT"
          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"
          echo "Using project: $PROJECT"
          echo "Using scheme: $SCHEME"

      - name: Build archive
        shell: bash
        run: |
          set -euo pipefail

          xcodebuild archive \
            -project "${{ steps.prepare_ios.outputs.project }}" \
            -scheme "${{ steps.prepare_ios.outputs.scheme }}" \
            -archivePath "_work/build.xcarchive" \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Package IPA
        id: package
        shell: bash
        run: |
          set -euo pipefail

          APP_PATH="$(find "_work/build.xcarchive/Products/Applications" -maxdepth 1 -name "*.app" -print -quit || true)"
          if [[ -z "$APP_PATH" ]]; then
            echo "ERROR: No .app found in archive output"
            exit 1
          fi

          mkdir -p _work/Payload
          cp -R "$APP_PATH" _work/Payload/
          (cd _work && /usr/bin/zip -qry "${{ inputs.ipa_name }}.ipa" Payload)

          IPA_PATH="_work/${{ inputs.ipa_name }}.ipa"
          ls -lh "$IPA_PATH"
          echo "ipa_path=$IPA_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload application
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.ipa_name }}
          path: ${{ steps.package.outputs.ipa_path }}
          retention-days: 3
