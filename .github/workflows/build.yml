name: Build iOS app

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build.yml"

jobs:
  build_ios:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build archive and IPA
        shell: bash
        run: |
          set -xe

          python3 -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install gdown

          .venv/bin/gdown "https://drive.google.com/uc?id=1SCyMKUsUteUcrOYQQYhyDfFMuW3eVz42" -O archive.zip
          mkdir -p _work/src

          # unzip can fail on some non-UTF filenames in this archive; extract via Python instead.
          .venv/bin/python - <<'PY'
          import pathlib
          import shutil
          import sys
          import zipfile

          archive = pathlib.Path("archive.zip")
          out_root = pathlib.Path("_work/src")
          out_root.mkdir(parents=True, exist_ok=True)

          extracted = 0
          skipped = 0

          with zipfile.ZipFile(archive) as zf:
            for info in zf.infolist():
              raw_name = info.filename.replace("\\", "/")
              if not raw_name or raw_name.endswith("/"):
                continue

              pure = pathlib.PurePosixPath(raw_name)
              safe_parts = [p for p in pure.parts if p not in ("", ".", "..")]
              if not safe_parts:
                skipped += 1
                continue

              target = out_root.joinpath(*safe_parts)
              try:
                target.parent.mkdir(parents=True, exist_ok=True)
                with zf.open(info, "r") as src, open(target, "wb") as dst:
                  shutil.copyfileobj(src, dst)
                extracted += 1
              except OSError as exc:
                skipped += 1
                print(f"Skipping {raw_name!r}: {exc}")

          print(f"Extracted {extracted} files, skipped {skipped}.")
          if extracted == 0:
            print("ERROR: extraction failed (0 files extracted).")
            sys.exit(1)
          PY

          PROJECT="$(find _work/src -name '*.xcodeproj' -print -quit)"
          [ -n "$PROJECT" ] || { echo "No .xcodeproj found"; exit 1; }

          GAME_ROOT=""
          while IFS= read -r idx; do
            base="$(dirname "$idx")"
            if [[ -d "$base/data" && -d "$base/tyrano" ]]; then
              case "$base" in
                *"/ios-rpgmaker-native/"*|*"/RPG Maker MZ Framework for Xcode 12/www"*)
                  ;;
                *)
                  GAME_ROOT="$base"
                  break
                  ;;
              esac
            fi
          done < <(find _work/src -type f -name "index.html" -print)
          [ -n "$GAME_ROOT" ] || { echo "No game root found (index.html + data + tyrano)"; exit 1; }

          PROJ_DIR="$(dirname "$PROJECT")"
          rm -rf "$PROJ_DIR/www"
          mkdir -p "$PROJ_DIR/www"

          # If game root is extraction root, avoid copying template repo back into www.
          if [[ "$GAME_ROOT" == "_work/src" || "$GAME_ROOT" == "$(pwd)/_work/src" ]]; then
            rsync -a --delete \
              --exclude "ios-rpgmaker-native/" \
              --exclude "Omake/" \
              "$GAME_ROOT/" "$PROJ_DIR/www/"
          else
            rsync -a --delete "$GAME_ROOT/" "$PROJ_DIR/www/"
          fi

          echo "Game root: $GAME_ROOT"
          du -sh "$PROJ_DIR/www" || true

          SCHEME="$(xcodebuild -list -project "$PROJECT" | awk '/Schemes:/{flag=1;next} flag && NF {print; exit}' | xargs)"
          [ -n "$SCHEME" ] || { echo "No scheme found in $PROJECT"; exit 1; }

          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -archivePath "_work/build.xcarchive" \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

          mkdir -p _work/Payload
          mv "_work/build.xcarchive/Products/Applications/"*.app _work/Payload/
          (cd _work && zip -r TF27-iOS.ipa Payload)
          mv _work/TF27-iOS.ipa "${{ runner.temp }}/TF27-iOS.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: TF27
          path: ${{ runner.temp }}/TF27-iOS.ipa
          retention-days: 3
